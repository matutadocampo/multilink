<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Carregando...</title>

  <script>
    // =========================
    // CONFIGURAÇÃO DOS LINKS
    // =========================

    const links = [
      {
        url: "https://www.effectivecpmnetwork.com/k742uhgh?key=6abc0654bcac05a09317923308553009",
        porcentagem: 5
      },
      {
        url: "https://omg10.com/4/10804008",
        porcentagem: 5
      },
      {
        url: "https://www.effectivecpmnetwork.com/pjzb35eu?key=c7ced442a4b1517e22d13546f40c6042",
        porcentagem: 90
      }
    ];

    // =========================
    // FUNÇÃO DE REDIRECIONAMENTO
    // =========================

    function redirecionar() {

      const numero = Math.random() * 100;
      let acumulado = 0;

      for (let i = 0; i < links.length; i++) {

        acumulado += links[i].porcentagem;

        if (numero <= acumulado) {
          window.location.href = links[i].url;
          return;
        }
      }
    }

    // =========================
    // TEMPO DE ESPERA
    // =========================

    setTimeout(redirecionar, 2000); // 2000 = 2 segundos
  </script>

  <style>
    body{
      margin:0;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      font-family:Arial, sans-serif;
      background:#ffffff;
    }
  </style>
</head>

<body>
  <h1>Carregando...U.U</h1>
</body>
</html>
